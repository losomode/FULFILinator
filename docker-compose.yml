version: '3.8'

services:
  fulfilinator-backend:
    build: ./backend
    container_name: fulfilinator-backend
    ports:
      - "8003:8003"
    volumes:
      - ./backend:/app
      - ./backend/db.sqlite3:/app/db.sqlite3
      - ./backend/media:/app/media
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-fulfilinator-dev-key
      - ALLOWED_HOSTS=localhost,127.0.0.1,fulfilinator-backend
      - AUTHINATOR_API_URL=http://authinator-backend:8001/api/auth/
      - AUTHINATOR_VERIFY_SSL=False
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8003"
    networks:
      - services-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/api/fulfil/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  services-network:
    name: services-network
    driver: bridge
