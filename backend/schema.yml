openapi: 3.0.3
info:
  title: FULFILinator API
  version: 1.0.0
  description: Order fulfillment tracking system - Manages Purchase Orders, Orders,
    and Deliveries with fulfillment visibility
paths:
  /api/fulfil/admin-overrides/:
    get:
      operationId: admin_overrides_list
      description: |-
        ViewSet for viewing admin override history (read-only).

        Only system admins can access this endpoint.

        Supports filtering by:
        - entity_type: Filter by PO, ORDER, or DELIVERY
        - entity_id: Filter by specific entity ID
        - user_id: Filter by user who performed the override

        Example:
        - GET /api/fulfil/admin-overrides/
        - GET /api/fulfil/admin-overrides/?entity_type=PO&entity_id=1
        - GET /api/fulfil/admin-overrides/?user_id=123
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - admin-overrides
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdminOverrideList'
          description: ''
  /api/fulfil/admin-overrides/{id}/:
    get:
      operationId: admin_overrides_retrieve
      description: |-
        ViewSet for viewing admin override history (read-only).

        Only system admins can access this endpoint.

        Supports filtering by:
        - entity_type: Filter by PO, ORDER, or DELIVERY
        - entity_id: Filter by specific entity ID
        - user_id: Filter by user who performed the override

        Example:
        - GET /api/fulfil/admin-overrides/
        - GET /api/fulfil/admin-overrides/?entity_type=PO&entity_id=1
        - GET /api/fulfil/admin-overrides/?user_id=123
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Admin Override.
        required: true
      tags:
      - admin-overrides
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminOverride'
          description: ''
  /api/fulfil/attachments/:
    get:
      operationId: attachments_list
      description: |-
        ViewSet for managing attachments.

        Supports:
        - List: GET /api/fulfil/attachments/?content_type=PO&object_id=1
        - Create: POST /api/fulfil/attachments/ (multipart/form-data)
        - Retrieve: GET /api/fulfil/attachments/{id}/
        - Delete: DELETE /api/fulfil/attachments/{id}/
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - attachments
