components:
  schemas:
    AdminOverride:
      type: object
      description: Serializer for AdminOverride model (read-only).
      properties:
        id:
          type: integer
          readOnly: true
        entity_type:
          allOf:
          - $ref: '#/components/schemas/EntityTypeEnum'
          description: |-
            Type of entity that was overridden

            * `PO` - Purchase Order
            * `ORDER` - Order
            * `DELIVERY` - Delivery
        entity_type_display:
          type: string
          readOnly: true
        entity_id:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
          description: ID of the PO/Order/Delivery
        entity_number:
          type: string
          description: PO/Order/Delivery number for easy reference
          maxLength: 50
        override_type:
          allOf:
          - $ref: '#/components/schemas/OverrideTypeEnum'
          description: |-
            Type of override performed

            * `CLOSE` - Force Close
            * `WAIVE` - Waive Quantity
            * `PRICE` - Price Override
            * `ALLOCATION` - Allocation Override
            * `OTHER` - Other
        override_type_display:
          type: string
          readOnly: true
        reason:
          type: string
          description: Reason provided by admin for the override
        user_id:
          type: string
          description: ID of admin user who performed the override (from Authinator)
          maxLength: 255
        user_email:
          type: string
          format: email
          description: Email of admin user who performed the override
          maxLength: 254
        created_at:
          type: string
          format: date-time
          readOnly: true
        metadata:
          description: Additional context about the override
      required:
      - created_at
      - entity_id
      - entity_number
