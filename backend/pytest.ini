[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts = 
    --verbose
    --strict-markers
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=40
    --no-cov-on-fail
# NOTE: Coverage threshold temporarily lowered to 40% during migration to Deft standards.
# Goal: Gradually increase to 85% as we add tests for existing code.
# New code MUST have ≥85% coverage in its specific module.
testpaths = 
    core
    items
    purchase_orders
    orders
    deliveries
    notifications
    dashboard
